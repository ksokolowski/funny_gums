name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install gum
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update && sudo apt-get install -y gum

      - name: Run shellcheck (errors only)
        run: shellcheck --severity=error funny_gums.sh lib/**/*.sh examples/*.sh tests/*.sh

      - name: Debug VS16 encoding
        run: |
          source lib/core/emoji_data.sh
          echo "Bash version: $BASH_VERSION"
          echo "VS16 length: ${#VS16}"
          printf "VS16 hex: " && printf '%s' "$VS16" | xxd
          echo "Array keys count: ${#EMOJI_WIDTH[@]}"
          # Test key lookup
          GEAR_VS16="⚙${VS16}"
          echo "Looking up: GEAR_VS16"
          printf "GEAR_VS16 hex: " && printf '%s' "$GEAR_VS16" | xxd
          echo "Result: ${EMOJI_WIDTH[$GEAR_VS16]:-NOT_FOUND}"

      - name: Run tests
        run: ./tests/run_tests.sh
